[project]
name = "cnn"
version = "1.0.2"
description = "CNN"
dependencies = [
    "torch>=2.2.1",
    "torchvision>=0.17.1",
    "lightning>=2.2.1",
    "torchrl>=0.3.1",
    "einops>=0.7.0",
    "wandb>=0.16.1",
    "matplotlib>=3.7.5",
    "gdown>=5.1.0",
    "distribution_extension @ git+https://github.com/nomutin/distribution-extension.git",
]
readme = "README.md"
requires-python = ">= 3.8"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "isort>=5.13.2",
    "black>=23.12.0",
    "ruff>=0.1.8",
    "mypy>=1.7.1",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.black]
line-length = 79

[tool.mypy]
python_version = 3.8

[tool.isort]
profile = "black"
line_length = 79

[tool.ruff]
exclude = [".git", ".ruff_cache", ".venv",]
line-length = 79
target-version = "py38"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203",   # one-blank-line-before-class
    "D212",   # multi-line-summary-first-line
    "ANN",    # Missing type annotation for `self` or `cls`
    "I",
    "COM812",
    "ISC001",
]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
